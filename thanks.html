<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>送信完了 | Nerio's Portfolio</title>
  <link rel="icon" href="images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Noto Sans JP", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #FFFFFF;
      color: #333333;
      padding: 24px;
    }
    .thanks {
      text-align: center;
      max-width: 500px;
    }
    .thanks__title {
      font-family: "Lato", sans-serif;
      font-size: 32px;
      font-weight: 100;
      letter-spacing: 0.08em;
      margin-bottom: 24px;
    }
    .thanks__message {
      font-size: 15px;
      line-height: 2;
      color: #505050;
      margin-bottom: 48px;
    }
    .thanks__link {
      display: inline-block;
      padding: 14px 40px;
      font-size: 15px;
      font-weight: 700;
      color: #FFFFFF;
      background-color: #333333;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: background-color 0.3s ease;
    }
    .thanks__link:hover {
      background-color: #555555;
    }
  </style>
</head>
<body>
  <div class="thanks">
    <h1 class="thanks__title">Thank You -</h1>
    <p class="thanks__message">
      お問い合わせありがとうございます。<br>
      内容を確認のうえ、折り返しご連絡いたします。
    </p>
    <a href="index.html" class="thanks__link">トップページに戻る</a>
  </div>
</body>
</html>
